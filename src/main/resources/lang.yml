# Lang file for Fundamentals
# You can use legacy colors like: &4

started: "Started Fundamentals"
stopped: "Stopped Fundamentals"

# Player commands
# Placeholders: PLAYER
cmds:
  # Msg
  # Extra placeholders: OTHER, MSG
  msg:
    log: "PLAYER said to OTHER: MSG"
    send: "&5&lYou &9-> &1&lOTHER&9: &rMSG"
    receive: "&1&lPLAYER &9-> &5&lYou&9: &rMSG"
  # Tpa/Tpahere/Tpaccept/Tpdeny/Tpacancel
  # Extra placeholders: OTHER
  tpa:
    multiple: "&cYou already have an outgoing tp request! &eCancel it with &l/tpacancel"
    none: "&cYou have no incoming tp requests!"
    expired:
      log: "PLAYER's request to OTHER expired"
      sent: "&cYour teleport request to &1&lOTHER&c expired!"
      receive: "&cTeleport request from &1&lPLAYER&c expired!"
    cancelled:
      log: "PLAYER cancelled request to OTHER"
      sent: "&5Cancelled outgoing request to &1&lOTHER"
      receive: "&cTpa request from &1&lPLAYER&c was cancelled!"
    denied:
      log: "OTHER denied request from PLAYER"
      sent: "&1&lOTHER&c denied your tp request!"
      receive: "&cTpa request from &1&lPLAYER&c was denied!"
    request:
      tpa:
        log: "PLAYER sent tpa request to OTHER"
        sent: "&5Requested to teleport to &1&lOTHER"
        receive: "&1&lPLAYER&5 has requested to teleport to you. &eUse &l/tpaccept&e to accept this request."
      tpahere:
        log: "PLAYER sent tpahere request to OTHER"
        sent: "&5Requested &1&lOTHER&5 to teleport here."
        receive: "&1&lPLAYER&5 has requested you teleport to them. &eUse &l/tpaccept&e to accept this request."
    accepted:
      log: "OTHER accepted PLAYER's teleport request"
      sent: "&1&lOTHER&5 accepted your teleport request!"
      receive: "&5Accepted &1&lPLAYER&5's teleport request!"
    standstill: "&eDon't move! &dTeleporting in 5 seconds!"
    # Countdown: will show in actionbar and can use SECS placeholder
    countdown: "&5Teleporting in &lSECS&5..."
  # Ignore
  # Extra placeholders: OTHER
  ignore:
    ignore:
      log: "PLAYER ignored OTHER"
      send: "&5Ignored &1&lOTHER!"
    unignore:
      log: "PLAYER unignored OTHER"
      send: "&5Stopped ignoring &1&lOTHER"

# Staff commands
# Placeholders: PLAYER, VICTIM (Player might show up as "CONSOLE" in some cases)
staffcmds:
  # Freeze command
  # log, staff, and player messages
  freeze:
    log:
      start: "PLAYER froze VICTIM!"
      stop: "PLAYER unfroze VICTIM!"
    staff:
      start: "&cFroze VICTIM"
      stop: "&cUnfroze VICTIM"
    player:
      start: "&cYou have been frozen!"
      actionbar: "&cYou are frozen"
      stop: "&2You were unfrozen!"
  # Invsee
  # log and staff messages
  invsee:
    log: "PLAYER opened VICTIM's inventory!"
    staff: "&2Opened VICTIM's inventory"
  # Staffmsg
  # log, staff, and player messages, can use MSG placeholder and legacy colors
  staffmsg:
    log: "PLAYER staff-messaged VICTIM: MSG"
    staff: "&4&lStaff &c-> &a&lVICTIM&4: &rMSG"
    player: "&4&lStaff &c-> &a&lYou&4: &rMSG"
  # Staffmode
  # log and staff message, VICTIM placeholder only if a name was entered (/staffmode [player to spectate - not required])
  staffmode:
    log:
      enter: "PLAYER entered staffmode"
      exit: "PLAYER exited staffmode"
    staff:
      enter: "&bEntered staffmode"
      exit: "&bExited staffmode"
    addon: ", spectating VICTIM"
  # Feed
  feed:
    log: "PLAYER fed VICTIM"
    staff: "&6Fed VICTIM"
  # Gamemode
  # GM placeholder
  gamemode:
    log: "PLAYER changed VICTIM's gamemode to GM"
    staff: "&5Changed &dVICTIM&5's gamemode to &b&lGM"
  # Tpoffline
  tpo:
    log: "PLAYER teleported to offline player VICTIM"
    staff: "&5Teleported to &dVICTIM&5!"
    error: "&c&lVICTIM&c couldn't be found!"
  # Fly
  fly:
    enter:
      log: "PLAYER entered fly!"
      staff: "&5Entered fly mode!"
    exit:
      log: "PLAYER exited fly!"
      staff: "&5Exited fly mode!"

# No placeholders, extra messages
msgs:
  playeronly: "&cThis command can only be run by a player."
  disabled: "&cThis command is disabled."
  notfound: "&cCommand not found."
  offline: "&cPlayer is not online."
  invalid: "&cInvalid argument!"
  fileerror: "&cAn error occurred and the server couldn't save that change."
  ignored: "&cThis player is ignoring you!"
  self: "&cYou can't use this command on yourself!"

# Most non-command chat messages
# Can use PLAYER placeholder for most
chat:
  # All chat
  # Can use MSG placeholder
  format: "&7PLAYER: MSG"
  # Joins
  join: "&f&l[&a&l+&f&l] &7PLAYER"
  firstjoin: "&a&lPLAYER joined the server for the first time! &5Everyone welcome &1&lPLAYER&5!"
  leave: "&f&l[&c&l-&f&l] &7PLAYER"
  # Death message
  # Can use DEATH placeholder
  death: "&c☠ PLAYER DEATH"
  # Messages
  # No placeholders
  nolinks: "&cYou can't use links in chat!"
  disallowed: "&cThat's not appropriate!"

# OpChecker logging
ops:
  # CMD, EXECUTOR, and PLAYER will be replaced where applicable
  # When op/deop are run from console (pretty reliable)
  console:
    op: "Console op'd! CMD"
    deop: "Console deop'd! CMD"
  # When a player runs op/deop (unreliable)
  player:
    op: "Player EXECUTOR op'd! CMD"
    deop: "Player EXECUTOR deop'd! CMD"
  # When the plugin detects a player has gained or lost the op permission via Bukkit API (most reliable/useful)
  detect:
    op: "PLAYER was opped!"
    deop: "PLAYER was deopped!"