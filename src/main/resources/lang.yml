# Lang file for Fundamentals
# You can use legacy colors like: &4

started: "Started Fundamentals"
stopped: "Stopped Fundamentals"

# Player commands
# Placeholders: PLAYER
cmds:
  # Msg
  # Placeholders: OTHER, MSG
  msg:
    log: "PLAYER said to OTHER: MSG"
    send: "&5&lYou &9-> &1&lOTHER&9: &rMSG"
    receive: "&1&lPLAYER &9-> &5&lYou&9: &rMSG"

# Staff commands
# Placeholders: PLAYER, VICTIM
staffcmds:
  # Freeze command
  # log, staff, and player messages
  freeze:
    log:
      on: "PLAYER froze VICTIM!"
      off: "PLAYER unfroze VICTIM!"
    staff:
      on: "&cFroze VICTIM"
      off: "&cUnfroze VICTIM"
    player:
      on: "&cYou have been frozen!"
      actionbar: "&cYou are frozen"
      off: "&2You were unfrozen!"
  # Invsee
  # log and staff messages
  invsee:
    log: "PLAYER opened VICTIM's inventory!"
    staff: "&2Opened VICTIM's inventory"
  # Staffmsg
  # log, staff, and player messages, can use MSG placeholder and legacy colors
  staffmsg:
    log: "PLAYER messaged VICTIM: MSG"
    staff: "&4&lStaff &c-> &a&lVICTIM&4: &rMSG"
    player: "&4&lStaff &c-> &a&lYou&4: &rMSG"
  # Staffmode
  # log and staff message, No VICTIM placeholder
  staffmode:
    log:
      enter: "PLAYER entered staffmode"
      exit: "PLAYER exited staffmode"
    staff:
      enter: "&bEntered staffmode"
      exit: "&bExited staffmode"
  # Feed
  feed:
    log: "PLAYER fed VICTIM"
    staff: "Fed VICTIM"

# No placeholders, extra messages
msgs:
  playeronly: "&cThis command can only be run by a player."
  disabled: "&cThis command is disabled."
  notfound: "&cCommand not found."
  offline: "&cPlayer is not online."

# OpChecker logging
ops:
  # CMD, EXECUTOR, and PLAYER will be replaced where applicable
  # When op/deop are run from console (pretty reliable)
  console:
    op: "Console op'd! CMD"
    deop: "Console deop'd! CMD"
  # When a player runs op/deop (unreliable)
  player:
    op: "Player EXECUTOR op'd! CMD"
    deop: "Player EXECUTOR deop'd! CMD"
  # When the plugin detects a player has gained or lost the op permission via Bukkit API (most reliable/useful)
  detect:
    op: "PLAYER was opped!"
    deop: "PLAYER was deopped!"