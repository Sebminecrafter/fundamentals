name: "Fundamentals"
description: "Everything you need for your server, all in one package."
prefix: "Fundamentals"
version: "1.0-SNAPSHOT"

main: io.github.sebminecrafter.fundamentals.Main
api-version: '26.1'
load: STARTUP

authors: [ "Sebminecrafter" ]
website: "modrinth.com/user/Sebminecrafter"

commands:
  # Staff commands
  staffmode:
    description: "Enter staff mode"
    usage: "Usage: /<command> [player]"
    permission: fundamentals.staff.staffmode
    aliases: ['sm', 'spectate']
  invsee:
    description: "View a player's inventory"
    usage: "Usage: /<command> <player>"
    permission: fundamentals.staff.invsee
    aliases: ['inventorysee']
  freeze: # TODO
    description: "Not implemented yet!"
    usage: "Usage: /<command> <player>"
    permission: fundamentals.staff.freeze
    aliases: []
  staffmsg:
    description: "Message a player as \"staff\""
    usage: "Usage: /<command> <player> <message>"
    permission: fundamentals.staff.staffmsg
    aliases: []
  feed:
    description: "Fill a player's hunger"
    usage: "Usage: /<command> <player>"
    permission: fundamentals.staff.feed
    aliases: []
  gamemode:
    description: "Change gamemode"
    usage: "Usage: /<command> [player] <gamemode>"
    permission: fundamentals.staff.gamemode
    aliases: ['gm', 'gms', 'gmc', 'gma', 'gmsp']

  # Player commands
  msg:
    description: "Message a player"
    usage: "Usage: /<command> <player> <message>"
    permission: fundamentals.player.msg
    aliases: ['w', 'whisper']
  ignore:
    description: "Ignore a player's messages and tp requests"
    usage: "Usage: /<command> <player>"
    permission: fundamentals.player.ignore
    aliases: ['block']
  tpa:
    description: "Teleport requests"
    usage: "Usage varies: /tpa <player>, /tpahere <player>, /tpacancel, /tpaccept [player], /tpdeny [player]"
    permission: fundamentals.player.tpa
    aliases: ['tpaccept', 'tpdeny', 'tpacancel', 'tpahere']

default-permission: op
permissions:
  fundamentals.staff:
    description: "Staff commands parent permission"
    default: op
    children:
      fundamentals.staff.freeze:
        description: "Ability to use the freeze command to freeze players"
      fundamentals.staff.invsee:
        description: "Ability to use the invsee command to view a player's inventory"
      fundamentals.staff.staffmsg:
        description: "Ability to use the staffmsg command on players"
      fundamentals.staff.staffmode:
        description: "Ability to use the staffmode command"
      fundamentals.staff.feed:
        description: "Ability to use the feed command on players"
  fundamentals.player:
    description: "Player commands parent permission"
    default: true
    children:
      fundamentals.player.msg:
        description: "Message other players privately"
      fundamentals.player.ignore:
        description: "Ignore messages and tp requests from a player"
      fundamentals.player.tpa:
        description: "Request to teleport to players"